<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>A2B Admin</title>
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --surface:   #141414;
      --surface2:  #1a1a1a;
      --border:    #242424;
      --text:      #f0f0f0;
      --muted:     #777;
      --accent:    #00DF81;
      --accent-dim:#00DF8122;
      --danger:    #e53935;
      --radius:    6px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      font-size: 14px;
      line-height: 1.5;
    }

    a { color: inherit; text-decoration: none; }

    /* ─── LOGIN SCREEN ─── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: var(--bg);
    }
    .login-box {
      width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 40px 36px;
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .login-logo img { width: 32px; height: 32px; content: url('/assets/logos/primarylogo-black.png'); filter: none; }
    .login-logo-text {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .login-logo-sub {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-left: 2px;
    }
    .login-field { margin-bottom: 16px; }
    .login-field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .login-field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .login-field input:focus { border-color: var(--accent); }
    #login-error {
      font-size: 0.82rem;
      color: var(--danger);
      margin-bottom: 14px;
      min-height: 18px;
    }
    .login-btn {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      padding: 11px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-btn:hover:not(:disabled) { opacity: 0.9; }

    /* ─── DASHBOARD ─── */
    #dashboard {
      display: none;
      height: 100vh;
    }

    /* Sidebar */
    #sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo img { width: 28px; content: url('/assets/logos/primarylogo-black.png'); filter: none; }
    .sidebar-logo-text { font-weight: 700; font-size: 1rem; }
    .sidebar-logo-sub  { font-size: 0.65rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; }

    .sidebar-nav { padding: 16px 10px; flex: 1; overflow-y: auto; }
    .nav-group-label {
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 8px 10px 4px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      color: var(--muted);
      font-size: 0.875rem;
      font-weight: 400;
      transition: background 0.15s, color 0.15s;
      user-select: none;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: var(--accent-dim); color: var(--accent); font-weight: 500; }
    .nav-icon { font-size: 1rem; width: 18px; text-align: center; }

    .sidebar-footer {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
    }
    .sidebar-user {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .sidebar-user-name { font-size: 0.82rem; color: var(--muted); }
    .logout-btn {
      font-size: 0.75rem;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.2s, border-color 0.2s;
    }
    .logout-btn:hover { color: var(--danger); border-color: var(--danger); }

    /* Main content */
    #main-content {
      flex: 1;
      overflow-y: auto;
      height: 100%;
    }
    .section {
      display: none;
      padding: 32px 36px;
      min-height: 100%;
    }

    /* Section header */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .section-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 99px;
    }
    .search-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      padding: 8px 14px;
      outline: none;
      width: 280px;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent); }

    /* Table */
    .table-wrap { overflow-x: auto; }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.855rem;
    }
    .data-table th {
      text-align: left;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .data-table td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .data-table tbody tr:hover { background: var(--surface); }
    .data-table tbody tr:last-child td { border-bottom: none; }
    .td-muted  { color: var(--muted); font-size: 0.82rem; }
    .td-bold   { font-weight: 500; }
    .tag {
      display: inline-block;
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .table-link {
      color: var(--accent);
      font-size: 0.82rem;
    }
    .table-link:hover { text-decoration: underline; }

    /* Buttons */
    .btn-view {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      padding: 4px 12px;
      font-size: 0.78rem;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-view:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 0.78rem;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-danger:hover { border-color: var(--danger); color: var(--danger); }
    .action-row { display: flex; gap: 6px; }

    /* UTM Manager */
    .utm-layout { display: flex; flex-direction: column; gap: 28px; }
    .utm-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px 28px;
    }
    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--text);
    }
    .form-row { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }
    .form-hint { font-weight: 400; text-transform: none; letter-spacing: 0; }
    .form-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 0.875rem;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 0 20px; }
    .slug-wrap { display: flex; align-items: center; }
    .slug-prefix {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-right: none;
      border-radius: var(--radius) 0 0 var(--radius);
      padding: 9px 12px;
      font-size: 0.82rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .slug-input { border-radius: 0 var(--radius) var(--radius) 0 !important; }
    .utm-preview-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 12px;
      font-size: 0.78rem;
      color: var(--accent);
      word-break: break-all;
      font-family: monospace;
    }
    .form-error { color: var(--danger); font-size: 0.8rem; margin-bottom: 10px; min-height: 18px; }
    .utm-form-actions { display: flex; gap: 10px; margin-top: 6px; }
    .btn-primary {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      padding: 9px 20px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary:hover:not(:disabled) { opacity: 0.88; }
    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 16px;
      font-family: inherit;
      font-size: 0.875rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .btn-secondary:hover { border-color: var(--accent); }
    .utm-short-row { display: flex; align-items: center; gap: 6px; }
    .utm-code {
      font-family: monospace;
      font-size: 0.78rem;
      color: var(--muted);
      background: var(--bg);
      padding: 2px 6px;
      border-radius: 3px;
    }
    .btn-copy {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 4px;
      transition: color 0.2s;
    }
    .btn-copy:hover { color: var(--accent); }

    /* Analytics modal */
    .analytics-stats {
      display: flex;
      gap: 12px;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    .stat-box {
      flex: 1;
      min-width: 80px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
      text-align: center;
    }
    .stat-num { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
    .stat-lbl { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 2px; }
    .analytics-dest {
      font-size: 0.82rem;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .analytics-sub-title {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    /* Lead Detail Modal */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 20px;
      margin-top: 16px;
    }
    .detail-item { display: flex; flex-direction: column; gap: 3px; }
    .detail-full { grid-column: 1 / -1; }
    .detail-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .detail-value { font-size: 0.875rem; color: var(--text); word-break: break-word; }

    /* Modal */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 1000;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 20px 20px;
      overflow-y: auto;
    }
    #modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 100%;
      max-width: 680px;
      padding: 28px 32px;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 18px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.3rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }
    .modal-close:hover { color: var(--text); }
    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 4px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 14px;
    }
    .modal-source-tag {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent);
      display: block;
      margin-bottom: 4px;
    }
    .modal-name { font-size: 1.1rem; font-weight: 600; }

    /* Shared */
    .loading {
      color: var(--muted);
      font-size: 0.875rem;
      padding: 40px 0;
      text-align: center;
    }
    .empty-state {
      color: var(--muted);
      font-size: 0.875rem;
      padding: 32px 0;
      text-align: center;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 9999;
    }
    .toast-show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
<body>

  <!-- ══════════ LOGIN ══════════ -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">
        <img src="/assets/logos/primarylogo-white.png" alt="A2B" />
        <div>
          <div class="login-logo-text">A2B</div>
          <div class="login-logo-sub">Admin</div>
        </div>
      </div>

      <form id="login-form" autocomplete="off">
        <div class="login-field">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" autocomplete="email" required />
        </div>
        <div class="login-field">
          <label for="login-password">Password</label>
          <input id="login-password" type="password" autocomplete="current-password" required />
        </div>
        <div id="login-error"></div>
        <button id="login-btn" type="submit" class="login-btn">Sign In</button>
      </form>
    </div>
  </div>

  <!-- ══════════ DASHBOARD ══════════ -->
  <div id="dashboard">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-logo">
        <img src="/assets/logos/primarylogo-white.png" alt="A2B" />
        <div>
          <div class="sidebar-logo-text">A2B</div>
          <div class="sidebar-logo-sub">Admin</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-group-label">Leads</div>
        <button class="nav-item" data-section="contact-leads" onclick="navigateTo('contact-leads')">
          <span class="nav-icon">📋</span> Contact Leads
        </button>
        <button class="nav-item" data-section="clinic-leads" onclick="navigateTo('clinic-leads')">
          <span class="nav-icon">🏥</span> Clinic Leads
        </button>

        <div class="nav-group-label" style="margin-top:16px">Outreach</div>
        <button class="nav-item" data-section="utm" onclick="navigateTo('utm')">
          <span class="nav-icon">🔗</span> UTM Manager
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <span class="sidebar-user-name" id="admin-username">—</span>
          <button class="logout-btn" onclick="adminLogout()">Log out</button>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <div id="main-content">

      <!-- Contact Leads -->
      <div id="section-contact-leads" class="section"></div>

      <!-- Clinic Leads -->
      <div id="section-clinic-leads" class="section"></div>

      <!-- UTM Manager -->
      <div id="section-utm" class="section"></div>

    </div>
  </div>

  <!-- ══════════ MODAL ══════════ -->
  <div id="modal-overlay">
    <div id="modal-box">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script type="module" src="/src/admin.js"></script>
</body>
</html>
